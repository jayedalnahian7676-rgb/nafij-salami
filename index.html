<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nafij Salami 🎉</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      color: white;
      padding: 50px;
    }
    .box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
    }
    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      width: 200px;
      margin-top: 10px;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    .link {
      margin-top: 20px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h1>🎁 Send Salami to Nafij</h1>

  <div class="box">
    <p>Enter your bKash number:</p>
    <input type="text" id="number" placeholder="01XXXXXXXXX">
    <br>
    <button onclick="generateLink()">Generate Link</button>

    <div class="link" id="output"></div>
  </div>

  <script>
    function generateLink() {
      let number = document.getElementById("number").value;
      if (!number) {
        alert("Enter a number!");
        return;
      }

      let message = `Eid Salami for Nafij 🎉`;
      let link = `https://api.whatsapp.com/send?text=${encodeURIComponent(message + " Send via bKash: " + number)}`;

      document.getElementById("output").innerHTML =
        `<p>Share this link:</p><a href="${link}" target="_blank">${link}</a>`;
    }
  </script>

</body>
